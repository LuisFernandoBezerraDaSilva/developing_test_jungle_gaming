_format_version: "3.0"

# Rate limiting global (bônus): 60 req/min por IP, política local
plugins:
  - name: rate-limiting
    config:
      minute: 60
      policy: local

services:
  - name: games-service
    url: http://games:4001
    routes:
      # REST: /games/* → games:4001/*  (strip remove o prefixo /games)
      - name: games-routes
        paths:
          - /games
        strip_path: true

      # WebSocket: /socket.io/* → games:4001/socket.io/*
      # strip_path: false preserva o path — o servidor socket.io precisa receber /socket.io/
      # Frontend conecta: io("http://localhost:8000/game", { path: "/socket.io/" })
      # Kong passa o HTTP Upgrade header nativamente → WebSocket funciona sem config extra
      - name: games-ws-route
        paths:
          - /socket.io
        strip_path: false

  - name: wallets-service
    url: http://wallets:4002
    routes:
      # REST: /wallets/* → wallets:4002/*  (strip remove o prefixo /wallets)
      - name: wallets-routes
        paths:
          - /wallets
        strip_path: true
